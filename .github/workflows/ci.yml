name: CI — Tests & Lint

on:
  push:
    branches: [all, main]
  pull_request:
    branches: [all, main]

jobs:
  # ──────────────────────────────────────────
  #  Backend — Python tests
  # ──────────────────────────────────────────
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: evoting
          POSTGRES_PASSWORD: evoting_pass
          POSTGRES_DB: evoting_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U evoting"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Initialize database
        run: |
          psql -h localhost -U evoting -d evoting_db -f database/init.sql
        env:
          PGPASSWORD: evoting_pass

      - name: Run tests
        run: |
          cd backend
          python -m pytest tests/ -v --tb=short --junitxml=../test-results/backend.xml
        env:
          DATABASE_URL: postgresql://evoting:evoting_pass@localhost:5432/evoting_db
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: ci-test-secret-key
          BLOCKCHAIN_URL: ""

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: test-results/backend.xml

  # ──────────────────────────────────────────
  #  Frontend — Build & Lint
  # ──────────────────────────────────────────
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: |
          cd frontend
          npm ci

      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          CI: false

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/build/

  # ──────────────────────────────────────────
  #  Docker Compose — Integration smoke test
  # ──────────────────────────────────────────
  integration:
    name: Docker Integration
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-build]

    steps:
      - uses: actions/checkout@v4

      - name: Build and start services
        run: docker compose up -d --build

      - name: Wait for services
        run: |
          echo "Waiting for backend..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health > /dev/null 2>&1; then
              echo "Backend is healthy"
              break
            fi
            sleep 2
          done

      - name: Health check
        run: |
          curl -sf http://localhost:8000/health | python3 -m json.tool

      - name: Frontend check
        run: |
          curl -sf http://localhost:3000 | head -20

      - name: Tear down
        if: always()
        run: docker compose down -v
